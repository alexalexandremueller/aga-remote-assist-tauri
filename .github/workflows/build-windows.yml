name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check WebView2 runtime
        shell: powershell
        run: |
          $paths = @(
            "C:\Program Files (x86)\Microsoft\EdgeWebView\Application",
            "C:\Program Files\Microsoft\EdgeWebView\Application"
          )
          $installed = $paths | Where-Object { Test-Path $_ }
          if ($installed) {
            Write-Host "WebView2 runtime detected."
          } else {
            Write-Warning "WebView2 runtime path was not detected explicitly. Continuing because GitHub-hosted Windows runners usually already include the required runtime."
          }

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:web

      - name: Build Tauri app
        id: tauri_build
        continue-on-error: true
        run: npx tauri build --bundles nsis

      - name: Debug release directory
        if: always()
        shell: powershell
        run: |
          Write-Host "Listing src-tauri\\target\\release"
          if (Test-Path "src-tauri\target\release") {
            dir "src-tauri\target\release" -Recurse
          } else {
            Write-Warning "Directory src-tauri\\target\\release does not exist."
          }
          Write-Host "Listing bundle outputs under src-tauri\\target"
          if (Test-Path "src-tauri\target") {
            Get-ChildItem "src-tauri\target" -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\bundle\\" } |
              Select-Object FullName
          }

      - name: Fail with clear message when build step fails
        if: steps.tauri_build.conclusion != 'success'
        shell: powershell
        run: |
          Write-Error "The Tauri build failed during the 'Build Tauri app' step. Review the step log above and the debug directory listing."
          exit 1

      - name: Collect Windows executables
        if: steps.tauri_build.conclusion == 'success'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          $portableExe = Get-ChildItem -Path "src-tauri\target" -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch "uninstall|setup|installer" } |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $portableExe) {
            throw "Portable .exe not found anywhere under src-tauri\\target."
          }

          Copy-Item $portableExe.FullName "release\AGA-Remote-Assist.exe" -Force

          $bundleDirs = Get-ChildItem -Path "src-tauri\target" -Directory -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\bundle\\(nsis|msi)\\" }

          if ($bundleDirs) {
            foreach ($dir in $bundleDirs) {
              Copy-Item (Join-Path $dir.FullName "*") "release\" -Recurse -Force -ErrorAction SilentlyContinue
            }
          } else {
            throw "No Windows bundle directories were found under src-tauri\\target. The portable executable was built, but no NSIS/MSI installer output was generated."
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aga-remote-assist-windows
          if-no-files-found: error
          path: release/*
