name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Copy exe to release folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $exe = Get-ChildItem -Path "src-tauri\target\release" -Filter *.exe |
            Where-Object { $_.Name -notmatch "uninstall|setup" } |
            Select-Object -First 1
          if (-not $exe) { throw "Nenhum .exe encontrado" }
          Copy-Item $exe.FullName "release\AGA-Remote-Assist.exe"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AGA-Remote-Assist
          path: release/AGA-Remote-Assist.exe
